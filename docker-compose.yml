services:
  frontend:
    build:
      context: ./frontend
    container_name: care-system-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      NEXT_PUBLIC_APP_NAME: care-system
      BACKEND_INTERNAL_URL: http://nginx
    depends_on:
      - nginx

  backend:
    build:
      context: ./docker/php
    container_name: care-system-backend
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - mysql

  nginx:
    image: nginx:1.27-alpine
    container_name: care-system-nginx
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  mysql:
    image: mysql:8.4
    container_name: care-system-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: care_system
      MYSQL_USER: care_user
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Tokyo
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
  frontend_node_modules: